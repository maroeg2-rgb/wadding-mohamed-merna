<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merna & Mohamed</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- شاشة البداية -->
<div class="cover" onclick="openInvite()">
  <h1>Open Invitation</h1>
</div>

<!-- الموقع -->
<div id="main" class="hidden">

  <section class="hero">
    <img src="photo.jpg">
    <h1>Merna & Mohamed</h1>
    <p>We Are Getting Married 💍</p>
  </section>

  <!-- العد التنازلي -->
  <section class="countdown">
    <h2>Wedding Countdown</h2>
    <div id="timer"></div>
  </section>

  <!-- التفاصيل -->
  <section class="details">
    <h2>Event Details</h2>
    <p>📍 Al Masa Hotel - Nasr City</p>
    <p>📅 20 June 2026</p>
  </section>

  <!-- الخريطة -->
  <section class="map">
    <iframe 
      src="https://https://share.google/BGIdZk36y3E7KO3GS =Al+Masa+Hotel+Nasr+City&output=embed">
    </iframe>
  </section>

  <!-- RSVP -->
  <section class="rsvp">
    <h2>RSVP</h2>
    <input type="text" placeholder="Your Name">
    <button>Confirm Attendance</button>
  </section>

</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
